stages:
  - test

test:junit:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
      when: always